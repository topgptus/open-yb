<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open YB</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="oyb-extension">
    <main class="oyb-popup">
      <header class="oyb-popup-brand">
        <img src="icons/open-yb-logo.svg" alt="" width="42" height="42">
        <div>
          <h1>Open YB</h1>
          <a href="https://github.com/topgptus/open-yb" target="_blank" rel="noreferrer">github.com/topgptus/open-yb</a>
        </div>
      </header>
      <label class="oyb-switch">
        <input id="enabled" type="checkbox">
        <span>接管元宝分享页</span>
      </label>
      <label class="oyb-field">
        <span>Worker 地址</span>
        <input id="worker-url" type="url" placeholder="https://your-worker.workers.dev">
      </label>
      <button id="save-settings" type="button">保存设置</button>
      <button id="open-options" type="button" class="oyb-secondary">打开收藏库</button>
      <p id="popup-status" class="oyb-note"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
