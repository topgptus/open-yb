<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open YB</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="oyb-extension">
    <main class="oyb-popup">
      <header class="oyb-popup-brand">
        <img src="icons/open-yb-logo.svg" alt="" width="42" height="42">
        <div>
          <h1>Open YB</h1>
          <a href="https://github.com/topgptus/open-yb" target="_blank" rel="noreferrer">github.com/topgptus/open-yb</a>
        </div>
      </header>
      <label class="oyb-switch">
        <input id="enabled" type="checkbox">
        <span>接管元宝分享页</span>
      </label>
      <label class="oyb-switch">
        <input id="auto-save" type="checkbox">
        <span>打开元宝链接后自动收藏</span>
      </label>
      <p class="oyb-note">不需要部署服务。可解析元宝分享页，也可把当前网页剪藏成 Markdown 存入收藏库。</p>
      <button id="save-settings" type="button">保存设置</button>
      <button id="save-page" type="button" class="oyb-secondary">保存当前网页为 MD</button>
      <button id="open-options" type="button" class="oyb-secondary">打开收藏库</button>
      <p id="popup-status" class="oyb-note"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
